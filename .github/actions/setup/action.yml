name: "Setup"
description: "Setup Node.js with Yarn caching"

runs:
  using: "composite"
  steps:
    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: "lts/*"
        check-latest: true
        cache: "yarn"
        cache-dependency-path: "yarn.lock"

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2

    - name: Install dependencies
      shell: bash
      run: yarn --immutable

    - name: Generate PWA icons
      shell: bash
      run: yarn pwa:generate-icons
